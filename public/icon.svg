<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with friendly gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="12" stroke-opacity="0.4" />
  
  <!-- Paw print background -->
  <path d="M180 200c-15 0-28 15-28 32s13 32 28 32 28-15 28-32-13-32-28-32zm152 0c-15 0-28 15-28 32s13 32 28 32 28-15 28-32-13-32-28-32zm-122-40c-18 0-32 18-32 40s14 40 32 40 32-18 32-40-14-40-32-40zm92 0c-18 0-32 18-32 40s14 40 32 40 32-18 32-40-14-40-32-40zm-46 110c-44 0-80 32-80 72 0 10 12 18 24 18h112c12 0 24-8 24-18 0-40-36-72-80-72z" fill="#b45309" opacity="0.15" />
  
  <!-- Smiling animal/cat face -->
  <!-- Ears -->
  <path d="M140 180 L80 300 L200 270 Z" fill="#b45309" />
  <path d="M372 180 L432 300 L312 270 Z" fill="#b45309" />
  <path d="M145 195 L105 280 L185 260 Z" fill="#f472b6" />
  <path d="M367 195 L407 280 L327 260 Z" fill="#f472b6" />
  
  <!-- Head -->
  <circle cx="256" cy="300" r="120" fill="#fef3c7" stroke="#b45309" stroke-width="16" />
  
  <!-- Eyes -->
  <circle cx="210" cy="280" r="16" fill="#1e293b" />
  <circle cx="302" cy="280" r="16" fill="#1e293b" />
  <!-- Eye sparkles -->
  <circle cx="206" cy="276" r="6" fill="#ffffff" />
  <circle cx="298" cy="276" r="6" fill="#ffffff" />
  
  <!-- Rosy Cheeks -->
  <circle cx="170" cy="315" r="14" fill="#f87171" opacity="0.6" />
  <circle cx="342" cy="315" r="14" fill="#f87171" opacity="0.6" />
  
  <!-- Nose/Snout -->
  <polygon points="256,310 244,295 268,295" fill="#f472b6" stroke="#b45309" stroke-width="4" stroke-linejoin="round" />
  <!-- Smile -->
  <path d="M236 320 Q256 340 276 320" fill="none" stroke="#b45309" stroke-width="8" stroke-linecap="round" />
  
  <!-- Telephone receiver overlay (cute & children-friendly) -->
  <rect x="186" y="380" width="140" height="40" rx="20" fill="#10b981" stroke="#ffffff" stroke-width="8" />
  <circle cx="196" cy="400" r="24" fill="#10b981" stroke="#ffffff" stroke-width="8" />
  <circle cx="316" cy="400" r="24" fill="#10b981" stroke="#ffffff" stroke-width="8" />
  <!-- Little handle shine -->
  <rect x="210" y="390" width="92" height="8" rx="4" fill="#ffffff" opacity="0.4" />
</svg>
